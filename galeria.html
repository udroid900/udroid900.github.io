<!DOCTYPE html>

<head>

<style>
body{
    background:#000;
    color:#fff;
    min-height:100vh;
    font-family:system-ui,-apple-system,sans-serif;
    overflow-x:hidden;
}

.logo{
    width:190px;
    display:block;
    margin:auto;
}

.menu-btn{
    position:fixed;
    top:20px;
    right:20px;
    width:52px;
    height:52px;
    border:none;
    border-radius:16px;
    background:rgba(255,255,255,.06);
    backdrop-filter:blur(20px);
    -webkit-backdrop-filter:blur(20px);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:5px;
    cursor:pointer;
    z-index:1002;
}

.menu-btn span{
    width:22px;
    height:2px;
    background:#fff;
    border-radius:999px;
    transition:.3s ease;
}

.menu-btn.active span:nth-child(1){
    transform:translateY(7px) rotate(45deg);
}

.menu-btn.active span:nth-child(2){
    opacity:0;
}

.menu-btn.active span:nth-child(3){
    transform:translateY(-7px) rotate(-45deg);
}

.menu-overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.5);
    opacity:0;
    visibility:hidden;
    transition:.3s;
    z-index:1000;
}

.menu-overlay.active{
    opacity:1;
    visibility:visible;
}

.mobile-menu{
    position:fixed;
    top:0;
    right:-280px;
    width:270px;
    height:100vh;
    background:rgba(10,10,10,.98);
    backdrop-filter:blur(30px);
    -webkit-backdrop-filter:blur(30px);
    padding-top:90px;
    display:flex;
    flex-direction:column;
    transition:.35s ease;
    z-index:1001;
}

.mobile-menu.active{
    right:0;
}

.mobile-menu a{
    color:#fff;
    text-decoration:none;
    padding:18px 28px;
    font-size:16px;
    transition:.25s;
}

.mobile-menu a:hover{
    background:rgba(255,255,255,.05);
}

.gallery{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:12px;
}

.gallery img{
    width:100%;
    aspect-ratio:1/1;
    object-fit:cover;
    border-radius:18px;
    transition:.3s;
}


@media(min-width:768px){
    .gallery{
        grid-template-columns:repeat(3,1fr);
    }
}
</style>
</head>

<body>

<button id="menuBtn" class="menu-btn" aria-label="Menú">

<div id="menuOverlay" class="menu-overlay"></div>

    <img src="terraza-ibiza3.png" class="cursor-pointer rounded-xl h-40 object-cover w-full" onclick="openGallery(3)">
    <img src="terraza-ibiza4.png" class="cursor-pointer rounded-xl h-40 object-cover w-full" onclick="openGallery(4)">

    <img src="terraza-ibiza6.png" class="cursor-pointer rounded-xl h-40 object-cover w-full" onclick="openGallery(6)">

<div id="lightbox" class="hidden fixed inset-0 bg-black/95 z-50 flex items-center justify-center">

    <button onclick="prevImg()" class="absolute left-4 text-white text-4xl">‹</button>

    <img id="lightboxImg" class="max-w-[90%] max-h-[90%] rounded-xl">

    <button onclick="nextImg()" class="absolute right-4 text-white text-4xl">›</button>

</div>

</div>
<script>
const images = [
    "terraza-ibiza.png",
    "terraza-ibiza1.png",
    "terraza-ibiza2.png",
    "terraza-ibiza3.png",
    "terraza-ibiza4.png",
    "terraza-ibiza5.png",
    "terraza-ibiza6.png",
    "mojitos-cubanos.png",
    "jardin-de-rosas.png",
    "sunset-crunch.png",
    "trago-ibiza.png",
	"ramazzoti.png",
	"tequila-blue.png",
    "marinero.png",
    "london-mule.png",
    "vino-blanco.png",
    "infierno-ibiza-pil-pil1.png",
    "pizza-poseidon.png",
    "monstruo-azul-de-ibiza.png",
    "thai-plato.png"
];

let currentIndex = 0;

function openGallery(index) {
    currentIndex = index;
    document.getElementById("lightbox").classList.remove("hidden");
    document.getElementById("lightboxImg").src = images[currentIndex];
}

function nextImg() {
    currentIndex = (currentIndex + 1) % images.length;
    document.getElementById("lightboxImg").src = images[currentIndex];
}

function prevImg() {
    currentIndex = (currentIndex - 1 + images.length) % images.length;
    document.getElementById("lightboxImg").src = images[currentIndex];
}

document.getElementById("lightbox").addEventListener("click", function (e) {
    if (e.target === this) {
        this.classList.add("hidden");
    }
});

document.addEventListener("keydown", function (e) {
    const lightbox = document.getElementById("lightbox");

    if (lightbox.classList.contains("hidden")) return;

    if (e.key === "ArrowRight") {
        nextImg();
    }

    if (e.key === "ArrowLeft") {
        prevImg();
    }

    if (e.key === "Escape") {
        lightbox.classList.add("hidden");
    }
});

let startX = 0;
let endX = 0;

const lightboxImg = document.getElementById("lightboxImg");

lightboxImg.addEventListener("touchstart", function (e) {
    startX = e.touches[0].clientX;
}, { passive: true });

lightboxImg.addEventListener("touchend", function (e) {
    endX = e.changedTouches[0].clientX;

    if (startX - endX > 50) {
        nextImg();
    } else if (endX - startX > 50) {
        prevImg();
    }
}, { passive: true });
</script>
<script>
const menuBtn = document.getElementById("menuBtn");
const mobileMenu = document.getElementById("mobileMenu");
const menuOverlay = document.getElementById("menuOverlay");

function toggleMenu(){
    menuBtn.classList.toggle("active");
    mobileMenu.classList.toggle("active");
    menuOverlay.classList.toggle("active");
}

menuBtn.addEventListener("click", toggleMenu);

menuOverlay.addEventListener("click", () => {
    menuBtn.classList.remove("active");
    mobileMenu.classList.remove("active");
    menuOverlay.classList.remove("active");
});
</script>

</body>
</html>
